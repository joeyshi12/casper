name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The `casper` package targets Node >=18.20, but the test script uses
        # `node --import`, which needs Node >=20.6 - so CI runs on current LTS lines.
        node-version: [20.x, 22.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # tsx strips types without checking them, so the test run alone would miss
      # type regressions; type-check the workspaces explicitly.
      - name: Type-check
        run: npm run typecheck

      - name: Unit tests
        run: npm test
